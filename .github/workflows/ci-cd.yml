name: CI / CD — ACS Group

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  # ─── TESTS ────────────────────────────────────────────────────────────────
  test:
    name: Tests PHPUnit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4

      - name: PHP 8.3
        uses: shivammathur/setup-php@7c071dfe9dc99bdf297fa79cb49ea005b9fcadbc  # v2
        with:
          php-version: '8.3'
          extensions: mbstring, pdo, pdo_sqlite, sqlite3, fileinfo
          coverage: none

      - name: Node.js 20
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020  # v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Cache Composer
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830  # v4
        with:
          path: vendor
          key: composer-${{ hashFiles('composer.lock') }}

      - name: Composer install
        run: composer install --optimize-autoloader --no-interaction

      - name: Build assets Vite
        run: npm ci && npm run build

      - name: Setup .env test
        run: |
          cp .env.example .env
          sed -i 's/DB_CONNECTION=mysql/DB_CONNECTION=sqlite/' .env
          echo "DB_DATABASE=:memory:" >> .env
          php artisan key:generate

      - name: Migrations
        run: php artisan migrate --force

      - name: Run tests
        run: php artisan test --stop-on-failure

  # ─── DEPLOY (main uniquement, après tests OK) ─────────────────────────────
  deploy:
    name: Deploy → Hostinger
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4

      - name: Node.js 20
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020  # v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: npm install
        run: npm ci

      - name: Build assets Vite
        run: npm run build

      - name: Sync assets compilés → serveur
        uses: appleboy/scp-action@917f8b81dfc1ccd331fef9e2d61bdc6c8be94634  # v0.1.7
        with:
          host: ${{ secrets.SSH_HOST }}
          port: ${{ secrets.SSH_PORT }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          source: "public/build/"
          target: "${{ secrets.DEPLOY_PATH }}/public/build/"
          strip_components: 2

      - name: Deploy sur serveur
        uses: appleboy/ssh-action@029f5b4aeeeb58fdfe1410a5d17f967dacf36262  # v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          port: ${{ secrets.SSH_PORT }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            set -e
            cd ${{ secrets.DEPLOY_PATH }}
            git pull origin main
            /opt/alt/php83/usr/bin/php /usr/local/bin/composer install --no-dev --optimize-autoloader --no-interaction
            /opt/alt/php83/usr/bin/php artisan config:cache
            /opt/alt/php83/usr/bin/php artisan route:cache
            /opt/alt/php83/usr/bin/php artisan view:cache
            /opt/alt/php83/usr/bin/php artisan migrate --force
            chmod -R 775 storage bootstrap/cache

            # Cron du worker de file d'attente (emails). Idempotent : dédoublonne
            # avant de réinstaller, donc sûr à rejouer à chaque déploiement.
            # --stop-when-empty évite un process qui tourne en continu (interdit
            # sur la plupart des hébergements mutualisés) : la minute suivante
            # relance simplement un nouveau passage.
            (crontab -l 2>/dev/null | grep -v 'artisan queue:work'; \
             echo "* * * * * cd ${{ secrets.DEPLOY_PATH }} && /opt/alt/php83/usr/bin/php artisan queue:work --stop-when-empty --max-time=50 >> /dev/null 2>&1") \
             | crontab -
            echo "--- crontab installé ---"
            crontab -l

            echo "✓ Deploy terminé"
